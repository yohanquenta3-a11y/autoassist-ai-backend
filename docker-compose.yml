services:

  api:
    build: .
    container_name: smart-mechanic-api
    restart: always
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY:-super-secret-local-key-for-development}
      - ROBOFLOW_API_KEY=${ROBOFLOW_API_KEY:-wuOFKaZQdzfzS4EOZNnp}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-AIzaSyABqE-z2_n0JtKN0aui9y9IE5bpPqHJgLs}
      - FIREBASE_SERVICE_ACCOUNT_PATH=${FIREBASE_SERVICE_ACCOUNT_PATH:-smart-mechanic-4a35e-firebase-adminsdk-fbsvc-b9d0bc3427.json}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    # Ejecutar migraciones antes de iniciar el servidor
    entrypoint: >
      sh -c "
        # Extraer el host de la DATABASE_URL para saber si es local
        DB_HOST=$(echo $DATABASE_URL | sed -e 's|.*@||' -e 's|/.*||' -e 's|:.*||')
        
        if [ \"$DB_HOST\" = \"db\" ]; then
          echo \"Esperando a la base de datos LOCAL ($DB_HOST)...\"
          until pg_isready -h db -p 5432 -U postgres; do
            echo 'Base de datos local no disponible todavía, reintentando...'
            sleep 2
          done
        else
          echo \"Conectando a base de datos REMOTA ($DB_HOST)...\"
        fi
        
        echo 'Ejecutando migraciones de Alembic...'
        alembic upgrade head
        echo 'Iniciando servidor...'
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

volumes:
#  postgres_data:
  uploads_data:
